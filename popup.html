<!DOCTYPE html>
<html lang="sv">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Markera kopplade bilder</title>
    <style>
      :root { color-scheme: light; }
      body {
        font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
        margin: 0;
        width: 260px;
        background: #fff;
        color: #1c1c1c;
      }
      .head {
        padding: 14px 16px 10px;
        border-bottom: 1px solid #eee;
      }
      .head h1 {
        font-size: 14px;
        margin: 0;
        font-weight: 600;
      }
      .head .sub {
        font-size: 11px;
        color: #777;
        margin: 3px 0 0;
      }
      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 16px;
        gap: 12px;
      }
      .row .label { font-size: 13px; font-weight: 500; }

      /* toggle-switch */
      .switch { position: relative; display: inline-block; width: 42px; height: 24px; flex: none; }
      .switch input { opacity: 0; width: 0; height: 0; }
      .slider {
        position: absolute; cursor: pointer; inset: 0;
        background: #cfcfcf; border-radius: 24px; transition: background .15s;
      }
      .slider::before {
        content: ""; position: absolute; height: 18px; width: 18px;
        left: 3px; top: 3px; background: #fff; border-radius: 50%;
        transition: transform .15s; box-shadow: 0 1px 2px rgba(0,0,0,.3);
      }
      .switch input:checked + .slider { background: #f9a825; }
      .switch input:checked + .slider::before { transform: translateX(18px); }
      .switch input:disabled + .slider { opacity: .5; cursor: default; }

      .count {
        padding: 0 16px 14px;
        font-size: 13px;
      }
      .count .num { font-weight: 700; }
      .count .dot {
        display: inline-block; width: 10px; height: 10px; border-radius: 2px;
        background: #ffeb3b; border: 1px solid #f9a825; margin-right: 6px;
        vertical-align: middle;
      }
      .status {
        padding: 0 16px 14px;
        font-size: 12px;
        color: #b26a00;
      }
      .hidden { display: none; }
    </style>
  </head>
  <body>
    <header class="head">
      <h1>Markera kopplade bilder</h1>
      <p class="sub">Gulmarkerar "Visa kopplade bilder" på Fortnox.</p>
    </header>

    <div class="row">
      <span class="label">Markering på</span>
      <label class="switch">
        <input id="toggle" type="checkbox" />
        <span class="slider"></span>
      </label>
    </div>

    <div id="count" class="count hidden">
      <span class="dot"></span><span id="countText"></span>
    </div>

    <div id="status" class="status hidden"></div>

    <script src="popup.js"></script>
  </body>
</html>
